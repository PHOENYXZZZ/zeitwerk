<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Dot pattern: dark circles that punch through the gold bolt -->
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="4" fill="#0f0e0b"/>
    </pattern>
    <!-- Clip the dot overlay to the bolt shape -->
    <clipPath id="boltClip">
      <polygon points="295,55 185,55 152,255 238,255 182,458 368,225 268,225"/>
    </clipPath>
    <!-- Mask: dots invisible at top, fully visible at bottom (dissolve effect) -->
    <linearGradient id="dissolveGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="black"/>
      <stop offset="40%"  stop-color="black"/>
      <stop offset="90%"  stop-color="white"/>
      <stop offset="100%" stop-color="white"/>
    </linearGradient>
    <mask id="dissolveMask" maskUnits="userSpaceOnUse" x="0" y="0" width="512" height="512">
      <rect width="512" height="512" fill="url(#dissolveGrad)"/>
    </mask>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0f0e0b"/>

  <!-- Solid gold lightning bolt -->
  <polygon points="295,55 185,55 152,255 238,255 182,458 368,225 268,225" fill="#e8c547"/>

  <!-- Dark dot pattern clipped to bolt, fading in from bottom = dissolve effect -->
  <rect x="0" y="0" width="512" height="512"
        fill="url(#dots)"
        clip-path="url(#boltClip)"
        mask="url(#dissolveMask)"/>
</svg>
